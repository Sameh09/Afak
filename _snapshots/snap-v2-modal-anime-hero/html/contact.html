<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تواصل معنا | ديكور فوم</title>
  <script>
    (function() {
      var t = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      if (t === 'dark') document.documentElement.classList.add('dark');
    })();
  </script>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/rtl.css">
</head>
<body>

<div id="scroll-progress"></div>
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<header class="header"><div class="header-inner">
  <a href="index.html" class="logo">
    <div class="logo-mark">ف</div>
    <div class="logo-name">
      <span class="name-main" data-ar="ديكور فوم" data-en="Decor Foam">ديكور فوم</span>
    </div>
  </a>
  <nav class="nav-links"></nav>
  <div class="nav-actions">
    <button id="theme-toggle" class="theme-toggle"></button>
    <button id="lang-toggle" class="lang-toggle">EN</button>
    <button class="menu-toggle"><span></span><span></span><span></span></button>
  </div>
</div></header>
<nav class="mobile-nav"></nav>

<!-- PAGE HERO -->
<section class="page-hero">
  <div class="container">
    <div class="breadcrumb">
      <a href="index.html" data-i18n="breadcrumb_home">الرئيسية</a>
      <span class="breadcrumb-sep">/</span>
      <span data-i18n="nav_contact">تواصل معنا</span>
    </div>
    <span class="section-badge" data-i18n="nav_contact">تواصل معنا</span>
    <h1 class="section-title" style="margin:.75rem 0" data-i18n="contact_title">تواصل معنا</h1>
    <p class="section-desc" data-i18n="contact_desc">يسعدنا سماع أفكارك ومناقشة مشروعك. فريقنا جاهز للمساعدة</p>
  </div>
  <div class="orb orb-1"></div>
</section>

<!-- CONTACT GRID -->
<main class="section">
  <div class="container">
    <div class="contact-grid">

      <!-- Info Card -->
      <div class="contact-info-card reveal">
        <h3 style="font-size:var(--text-xl);font-weight:700;margin-bottom:1.5rem" data-ar="معلومات التواصل" data-en="Contact Information">معلومات التواصل</h3>

        <div class="contact-info-item">
          <div class="contact-info-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          </div>
          <div>
            <div style="font-weight:700;margin-bottom:.25rem" data-i18n="contact_phone">الهاتف</div>
            <a href="tel:+966500000000" style="color:var(--text-muted);direction:ltr;display:block">+966 50 000 0000</a>
          </div>
        </div>

        <div class="contact-info-item">
          <div class="contact-info-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
          <div>
            <div style="font-weight:700;margin-bottom:.25rem" data-i18n="contact_email">البريد</div>
            <a href="mailto:info@decor-foam.com" style="color:var(--text-muted)">info@decor-foam.com</a>
          </div>
        </div>

        <div class="contact-info-item">
          <div class="contact-info-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
          <div>
            <div style="font-weight:700;margin-bottom:.25rem" data-i18n="contact_address">العنوان</div>
            <span style="color:var(--text-muted)" data-ar="الرياض، المملكة العربية السعودية" data-en="Riyadh, Saudi Arabia">الرياض، المملكة العربية السعودية</span>
          </div>
        </div>

        <div class="contact-info-item">
          <div class="contact-info-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
          <div>
            <div style="font-weight:700;margin-bottom:.25rem" data-i18n="contact_hours">ساعات العمل</div>
            <span style="color:var(--text-muted)" data-i18n="hours_value">الأحد - الخميس: ٩ص - ٦م</span>
          </div>
        </div>

        <!-- Social -->
        <div style="margin-top:1.5rem;display:flex;gap:.6rem" id="contact-social"></div>
      </div>

      <!-- Form -->
      <div class="reveal">
        <form id="contact-form">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">
                <span data-i18n="form_name">الاسم الكامل</span>
                <span class="req">*</span>
              </label>
              <input type="text" class="form-input" name="name" required data-i18n-placeholder="form_name">
            </div>
            <div class="form-group">
              <label class="form-label">
                <span data-i18n="form_email">البريد الإلكتروني</span>
                <span class="req">*</span>
              </label>
              <input type="email" class="form-input" name="email" required data-i18n-placeholder="form_email">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" data-i18n="form_phone">رقم الجوال</label>
              <input type="tel" class="form-input" name="phone" data-i18n-placeholder="form_phone">
            </div>
            <div class="form-group">
              <label class="form-label" data-i18n="form_subject">الموضوع</label>
              <select class="form-select" name="subject">
                <option data-ar="استفسار عام" data-en="General Inquiry">استفسار عام</option>
                <option data-ar="طلب عرض سعر" data-en="Request Quote">طلب عرض سعر</option>
                <option data-ar="استفسار عن منتج" data-en="Product Inquiry">استفسار عن منتج</option>
                <option data-ar="خدمة ما بعد البيع" data-en="After-Sales Service">خدمة ما بعد البيع</option>
                <option data-ar="شراكة أعمال" data-en="Business Partnership">شراكة أعمال</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">
              <span data-i18n="form_message">رسالتك</span>
              <span class="req">*</span>
            </label>
            <textarea class="form-textarea" name="message" rows="6" required
              data-i18n-placeholder="form_message"></textarea>
          </div>

          <button type="submit" class="btn btn-primary btn-lg" style="width:100%" data-i18n="form_send">
            إرسال الرسالة
          </button>
        </form>
      </div>
    </div>
  </div>
</main>

<footer class="footer" id="footer-render"></footer>

<script src="../js/data.js"></script>
<script src="../js/lang.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/animations.js"></script>
<script src="../js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  /* Render social links */
  const social = document.getElementById('contact-social');
  if (social) {
    Object.entries(DATA.site.socials).forEach(([k, v]) => {
      social.innerHTML += `<a href="${v}" class="social-link" target="_blank" rel="noopener">${getSocialIcon(k)}</a>`;
    });
  }
});
</script>
</body>
</html>
